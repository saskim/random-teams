<div class="add-player">
  <mat-form-field appearance="outline">
    <mat-label>Add player name</mat-label>
    <input matInput [(ngModel)]="newPlayerName" name="newPlayerName">
  </mat-form-field>
  <app-star-rating (ratingChange)="newPlayerRanking = $event"></app-star-rating>

  <button mat-mini-fab color="primary" aria-label="Add player" (click)="addPlayer()">
    <mat-icon>person_add</mat-icon>
  </button>
</div>

<div class="player-list">
  <p>{{ noOfActivePlayers() }} active players of {{ noOfPlayers() }}</p>
  <div class="player header">
    <span class="player-name clickable" (click)="sortBy('name')">Name</span>
    <span class="player-rating clickable" (click)="sortBy('rating')">Rating</span>
    <span class="active-toggle clickable" (click)="sortBy('isActive')">Active</span>
    <span class="delete-button clickable"></span>
  </div>
  <div *ngFor="let player of players" class="player">
    <span class="player-name">{{ player.name }}</span>
    <app-star-rating
      class="player-rating"
      [rating]="player.rating"
      (ratingChange)="updatePlayerRating(player, $event)">
    </app-star-rating>
    <mat-slide-toggle
      class="active-toggle"
      color="primary"
      name="playerIsActive"
      [checked]="player.isActive"
      (click)="updatePlayerIsActive(player)">
    </mat-slide-toggle>
    <button class="delete-button" mat-icon-button (click)="deletePlayer(player.id)">
      <mat-icon color="warn">delete</mat-icon>
    </button>
  </div>
</div>
